# Standalone deployment (without Home Assistant). For the Home Assistant
# add-on route, see README.md — you don't need this file there.
services:
  nations-league-pool:
    build: ./nations-league-pool
    container_name: nations-league-pool
    restart: unless-stopped
    ports:
      - "8099:8099"
    environment:
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in .env}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-william}
      - INVITE_CODE=${INVITE_CODE:-}
      - TZ=Europe/Amsterdam
    volumes:
      - pool_data:/data

volumes:
  pool_data:
